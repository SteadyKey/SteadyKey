<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Asahi Vault</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <h1>Asahi Vault</h1>

    <section id="machineKeySection">
      <label>Machine Key (端末固有)</label>
      <div id="machineKeyDisplay" class="machineKey">loading…</div>
    </section>

    <section id="authSection">
      <label for="pinInput">PIN</label>
      <input id="pinInput" type="password" inputmode="numeric" maxlength="10" placeholder="4桁〜" />
      <button id="unlockBtn">Unlock</button>
      <div id="status" class="status">Locked</div>
    </section>

    <section id="vaultSection">
      <h2>Entries</h2>
      <div id="entryList" class="list">loading…</div>
    </section>

    <section id="addSection">
      <h2>Add Entry</h2>
      <input id="newId" placeholder="id (site key)" />
      <input id="newTitle" placeholder="title (optional)" />
      <input id="newPassword" placeholder="password" />
      <button id="addBtn">Add (requires unlock)</button>
    </section>

    <pre id="output" class="output"></pre>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
